name: Android Release Bundle

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/android-release.yml"
      - "android/**"

jobs:
  build-android:
    name: Build Android AAB
    runs-on: ubuntu-latest
    env:
      ANDROID_UPLOAD_KEYSTORE_BASE64: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Prepare Play Store signing
        if: env.ANDROID_UPLOAD_KEYSTORE_BASE64 != '' && env.ANDROID_KEYSTORE_PASSWORD != '' && env.ANDROID_KEY_ALIAS != '' && env.ANDROID_KEY_PASSWORD != ''
        working-directory: android
        run: |
          echo "$ANDROID_UPLOAD_KEYSTORE_BASE64" | base64 --decode > app/upload-keystore.jks
          {
            echo "storeFile=upload-keystore.jks"
            echo "storePassword=$ANDROID_KEYSTORE_PASSWORD"
            echo "keyAlias=$ANDROID_KEY_ALIAS"
            echo "keyPassword=$ANDROID_KEY_PASSWORD"
          } > keystore.properties

      - name: Build release bundle
        working-directory: android
        run: ./gradlew bundleRelease

      - name: Upload Android App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: diagnosehub-android-release-aab
          path: android/app/build/outputs/bundle/release/*.aab
